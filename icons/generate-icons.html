<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Generating icons... check your Downloads folder.</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.1875;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#E8540A');
  grad.addColorStop(1, '#F59E0B');

  // Rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // LH text
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `900 ${size * 0.45}px Inter, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LH', size / 2, size * 0.55);

  // Live red dot
  ctx.beginPath();
  ctx.arc(size * 0.78, size * 0.22, size * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = '#EF4444';
  ctx.fill();
}

function download(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192, 192);
drawIcon(c512, 512);

setTimeout(() => {
  download(c192, 'icon-192.png');
  setTimeout(() => {
    download(c512, 'icon-512.png');
    document.body.innerHTML = '<h2 style="font-family:sans-serif;color:green">✅ Done! Move icon-192.png and icon-512.png to your LH/icons/ folder, then close this tab.</h2>';
  }, 500);
}, 300);
</script>
</body>
</html>
