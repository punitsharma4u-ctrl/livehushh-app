version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - echo "Static site — no build step"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

# Lambda functions are deployed separately via `amplify push`
# See SETUP.md for full deployment instructions
