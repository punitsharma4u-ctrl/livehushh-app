version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - echo "Static site — no build step"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
  - pattern: '**/*.html'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
      - key: Pragma
        value: no-cache
      - key: Expires
        value: '0'
  - pattern: '**/*.js'
    headers:
      - key: Cache-Control
        value: 'no-cache, must-revalidate'
  - pattern: '**/*.css'
    headers:
      - key: Cache-Control
        value: 'no-cache, must-revalidate'
