name: iOS Release → App Store

on:
  workflow_dispatch:   # run manually from GitHub with one click

jobs:
  build:
    runs-on: macos-latest

    steps:

      # 1. Get the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node + npm
      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install npm deps
        run: npm ci

      # 3. Sync Capacitor web assets to iOS
      - name: Capacitor sync
        run: npx cap sync ios

      # 4. Install CocoaPods deps (includes CapacitorAppleSignIn)
      - name: Pod install
        run: |
          cd ios/App
          pod install --repo-update

      # 5. Import Distribution Certificate (.p12)
      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain-db
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # 6. Install Provisioning Profile
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Extract UUID so Xcode can find the profile by UUID filename
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $UUID"

      # 7. Build & Archive
      - name: Build IPA
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            -allowProvisioningUpdates

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # 8. Upload to App Store Connect
      - name: Upload to App Store
        env:
          APP_STORE_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_KEY_CONTENT: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # altool requires the key named AuthKey_<KEY_ID>.p8 in one of its search paths
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID"
