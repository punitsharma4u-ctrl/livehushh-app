name: iOS Build → TestFlight

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. Get the code ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1b. Select latest Xcode ────────────────────────────────────────────
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. Install npm packages ────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 4. Add & sync iOS platform ─────────────────────────────────────────
      - name: Add iOS platform (if not present)
        run: npx cap add ios 2>/dev/null || true

      # ── 4a. Fix CocoaPods CDN → use git master specs ───────────────────────
      - name: Configure CocoaPods specs source
        run: |
          pod repo remove trunk || true
          pod repo add master https://github.com/CocoaPods/Specs.git || pod repo update master || true
          PODFILE="ios/App/Podfile"
          if [ -f "$PODFILE" ] && ! grep -q "github.com/CocoaPods/Specs" "$PODFILE"; then
            echo "source 'https://github.com/CocoaPods/Specs.git'" | cat - "$PODFILE" > /tmp/Podfile_tmp
            mv /tmp/Podfile_tmp "$PODFILE"
            echo "✅ Podfile patched to use git specs"
          fi

      - name: Sync Capacitor to iOS
        run: npx cap sync ios

      # ── 4b. Set app icon from icon.png ────────────────────────────────────
      - name: Set app icon
        run: |
          ICON_SRC="icon.png"
          ICON_DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png"
          if [ -f "$ICON_SRC" ]; then
            sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DEST"
            echo "✅ App icon set (1024x1024)"
          else
            echo "⚠️ icon.png not found, using existing icon"
          fi

      # ── 5. Install CocoaPods ───────────────────────────────────────────────
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update --verbose 2>&1 | tail -30

      # ── 6. Ruby + Fastlane ─────────────────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane --no-document

      # ── 7. Patch Info.plist privacy strings (after cap sync) ──────────────
      - name: Add privacy purpose strings to Info.plist
        run: |
          INFO_PLIST="ios/App/App/Info.plist"
          add_or_set() {
            /usr/libexec/PlistBuddy -c "Add :$1 string '$2'" "$INFO_PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :$1 '$2'" "$INFO_PLIST"
          }
          add_or_set NSCameraUsageDescription "LiveHushh uses your camera so restaurant owners can go live to promote their business and hot deals in real time. For example, an owner can stream their kitchen preparing tonight's special dish so customers can watch and decide to visit or order."
          add_or_set NSPhotoLibraryUsageDescription "LiveHushh needs photo library access to let you select photos."
          add_or_set NSPhotoLibraryAddUsageDescription "LiveHushh needs permission to save photos to your library."
          add_or_set NSLocationWhenInUseUsageDescription "LiveHushh uses your location to show nearby restaurants and live deals available in your area."
          add_or_set NSLocationAlwaysAndWhenInUseUsageDescription "LiveHushh uses your location to show nearby restaurants and live deals available in your area."
          add_or_set NSMicrophoneUsageDescription "LiveHushh uses your microphone so restaurant owners can speak and share their specials and promotions in real time during live streams. For example, a restaurant owner describes today's dishes and discounts live so customers can hear and act on the offer immediately."
          echo "✅ Privacy strings applied to Info.plist"

      # ── 8. Patch Xcode project signing ────────────────────────────────────
      - name: Set Xcode signing settings
        run: node scripts/fix-signing.js

      # ── 8b. Enable Sign in with Apple capability ───────────────────────────
      - name: Enable Sign in with Apple entitlement
        run: |
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          # Link entitlements file to the App target build settings
          if ! grep -q "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ"; then
            sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App\/App.entitlements;/' "$PBXPROJ"
          fi
          echo "✅ Entitlements configured"

      # ── 8. Code signing ────────────────────────────────────────────────────
      - name: Install Apple certificate & provisioning profile
        env:
          CERTIFICATE_P12_BASE64:      ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD:        ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/livehushh.mobileprovision

      # ── 9. Increment build number ──────────────────────────────────────────
      - name: Increment build number
        run: |
          cd ios/App
          BUILD_NUM=$(date +"${YEAR}%m%d%H%M" | sed 's/${YEAR}/'"$(date +%Y)"'/')
          xcrun agvtool new-version -all $(date +"%Y%m%d%H%M")

      # ── 10. Archive ────────────────────────────────────────────────────────
      - name: xcodebuild archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=464BK7HBM4 \
            "CODE_SIGN_IDENTITY=Apple Distribution"

      # ── 11. Export IPA ─────────────────────────────────────────────────────
      - name: xcodebuild export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/App.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build"
          find build -name "*.ipa" -exec cp {} LiveHushh.ipa \;

      # ── 12. Upload to TestFlight ───────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID:    ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY:       ${{ secrets.ASC_PRIVATE_KEY }}
        run: fastlane ios upload

      # ── 13. Save IPA as artifact ───────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: LiveHushh-iOS
          path: 'LiveHushh.ipa'
          retention-days: 30
